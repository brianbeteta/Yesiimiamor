<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi princesa Yesii 💖</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f051d, #290a33);
            color: #fff;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #pantalla-inicio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f051d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .btn-inicio {
            background-color: #ff4d6d;
            border: none;
            color: white;
            padding: 16px 35px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 77, 109, 0.5);
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-inicio:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }

        h1 {
            color: #ff758f;
            text-shadow: 0 0 15px rgba(255, 117, 143, 0.6);
            margin-bottom: 5px;
            font-size: 2.2em;
        }

        p.subtitulo {
            font-size: 1.1em;
            color: #e0aaff;
            margin-bottom: 35px;
            padding: 0 20px;
        }

        .contenedor-interactivo {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
            margin-bottom: 40px;
            padding: 0 15px;
        }

        .corazon-click {
            background: rgba(255, 77, 109, 0.15);
            color: white;
            border: 2px solid #ff4d6d;
            padding: 12px 22px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .corazon-click:hover {
            background: #ff4d6d;
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(255, 77, 109, 0.4);
        }

        #caja-mensaje {
            min-height: 100px;
            width: 85%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25em;
            line-height: 1.6;
            transition: opacity 0.3s ease;
        }

        .oculto { display: none !important; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h2 style="color: #ff758f; margin-bottom: 10px; font-weight: normal; text-align: center;">Tengo un detalle para ti antes de dormir, Mi amor...</h2>
        <p style="color: #a0a0c0; margin-bottom: 30px;">(Sube el volumen para escuchar la sorpresa)</p>
        <button class="btn-inicio" onclick="comenzar()">Abrir con amor ❤️</button>
    </div>

    <audio id="musica-fondo" loop preload="auto">
        <source src="amor.mp3" type="audio/mpeg">
        <source src="Amor.mp3" type="audio/mpeg">
    </audio>

    <h1>¡Feliz Noche, Mi Amor! 🌙</h1>
    <p class="subtitulo">Haz clic en cada botón para descubrir lo que tengo que decirte hoy:</p>

    <div class="contenedor-interactivo">
        <button class="corazon-click" onclick="mostrarMensaje(1)">✨ Tu sonrisa</button>
        <button class="corazon-click" onclick="mostrarMensaje(2)">💖 Lo que siento</button>
        <button class="corazon-click" onclick="mostrarMensaje(3)">🧸 Tus abrazos</button>
        <button class="corazon-click" onclick="mostrarMensaje(4)">🌹 Mi deseo hoy</button>
    </div>

    <div id="caja-mensaje">
        <span style="color: #a0a0c0; font-style: italic;">Presiona los botones de arriba...</span>
    </div>

    <script>
        const mensajes = {
            1: "Me encanta cómo iluminas todo a tu alrededor con solo sonreír. Es, sin duda, mi parte favorita de cada día, Yesii. 😍",
            2: "Cada día que pasa me doy cuenta de la suerte tan inmensa que tengo de tenerte en mi vida. Eres increíble, hermosa y completamente única. 🌹",
            3: "Tus abrazos son mi lugar seguro en el mundo, el sitio perfecto donde siempre quiero quedarme y reiniciarme. 🧸",
            4: "Que descanses delicioso, mi vida. Sueña con cosas hermosas y recuerda siempre que te amo con todo mi corazón. ¡Hasta mañana! ✨"
        };

        function comenzar() {
            document.getElementById('pantalla-inicio').classList.add('oculto');
            var audio = document.getElementById('musica-fondo');
            audio.volume = 0.5; 
            
            var playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Audio sonando.");
                }).catch(error => {
                    console.log("Bloqueo inicial: ", error);
                    document.body.addEventListener('click', function() {
                        audio.play();
                    }, { once: true });
                });
            }
        }

        function mostrarMensaje(id) {
            const caja = document.getElementById('caja-mensaje');
            caja.style.opacity = 0;
            
            setTimeout(() => {
                caja.innerHTML = mensajes[id];
                caja.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
